  name: Build Custom Image

  on:
    push:
      branches:
        - main
      paths:
        - Dockerfile
        - frontend/**
        - backend/**
        - docs/legal/**
        - deploy/docker-entrypoint.sh
        - .github/workflows/custom-image.yml
    workflow_dispatch:

  permissions:
    contents: read
    packages: write

  concurrency:
    group: custom-image-main
    cancel-in-progress: true

  env:
    IMAGE_NAME: ghcr.io/jakcky/sub2api

  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout
          uses: actions/checkout@v6

        - name: Set up Buildx
          uses: docker/setup-buildx-action@v3

        - name: Login to GHCR
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Build and push AMD64 image
          uses: docker/build-push-action@v6
          with:
            context: .
            file: Dockerfile
            platforms: linux/amd64
            push: true
            provenance: false
            sbom: false
            tags: |
              ${{ env.IMAGE_NAME }}:custom-main
              ${{ env.IMAGE_NAME }}:custom-${{ github.sha }}
            build-args: |
              GOPROXY=https://proxy.golang.org,direct
              GOSUMDB=sum.golang.org
              COMMIT=${{ github.sha }}
            cache-from: type=gha,scope=sub2api-amd64
            cache-to: type=gha,mode=max,scope=sub2api-amd64
